<!DOCTYPE html>
<html lang="en">
<head>

<!-- Core Stylesheet -->

<link rel="stylesheet" href="{{ url_for('static', filename='css/edit_product.css') }}" type="text/css">

</head>
<body>

    <header class="header-area">

        <!-- Navbar Area -->
        <div class="famie-main-menu" id="login_space">
            <div class="classy-nav-container breakpoint-off">
                <div class="container">
                    <!-- Menu -->
                    <nav class="classy-navbar justify-content-between" id="famieNav">
                        <!-- Nav Brand -->
                        <a href="#" class="nav-brand"><img
                            src="{{ url_for('static', filename='images/logo.png') }}" alt=""></a>
                        
                            <!-- Navbar Start -->
                            <div class="classynav">
                                <ul>
                                    <li><a href="{{ url_for('view_products') }}">Back</a></li>
                                    
                                </ul>

                            </div>
                            <!-- Navbar End -->
                        </div>
                    </nav>
                </header>
                <div class="upload-product" >
                    <div class="Product-section">
    <h1>Edit Product</h1>
    <img src="{{ url_for('static', filename='images/img/core-img/decor2.png') }}" alt=""><br><br>
    <form action="{{ url_for('edit_product', product_id=product['_id']) }}" method="POST">
        <label for="product_name">Product Name:</label>
        <input type="text" id="product_name" name="product_name" value="{{ product['name'] }}" required>

        <label for="price">Price:</label>
        <input type="text" id="price" name="price" value="{{ product['price'] }}" required>


        <label for="category">Category:</label>
        <input type="text" id="category" name="category" value="{{ product['category'] }}" required><br><br>

        
        <label for="description">Description:</label>
        <textarea id="description" name="description" required>{{ product['description'] }}</textarea><br>
        
         <!-- Container for aligned buttons -->
         
            
        <button type="submit" id="save">Save Changes</button>

    </form>
    <!-- Delete Button Form -->
    <form action="{{ url_for('delete_product', product_id=product['_id']) }}" method="POST" style="display:inline;">
        <button type="submit"  id="delete"  onclick="return confirm('Are you sure you want to delete this product?')">Delete Product</button>
    </form>
    </div>
    </div>
</html>
