<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page Layout</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .header {
            background: #ddd;
            height: 60px;
            width: 100%;
        }
        .main-container {
            display: flex;
            margin-top: 10px;
        }
        .sidebar, .rightbar {
            background: #ddd;
            width: 15%;
            height: 90vh;
        }
        .content {
            background: #fff;
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .profile-section {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            width: 100%;
        }
        .profile-pic {
            width: 30px;
            height: 30px;
            background: #ccc;
            border-radius: 50%;
            margin-right: 10px;
        }
        .profile-name {
            font-weight: bold;
        }
        .large-box {
            background: #ddd;
            width: 100%;
            height: 150px;
            margin-bottom: 20px;
        }
        .order-section {
            width: 80%;
            border: 1px solid black;
            border-radius: 15px;
            padding: 20px;
            background: #fff;
        }
        .order-item {
            background: #ddd;
            height: 40px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="header"></div>

    <div class="main-container">
        <div class="sidebar"></div>

        <div class="content">
            <div class="profile-section">
                <div class="profile-pic"></div>
                <div class="profile-name">Profile name</div>
            </div>

            <div class="large-box"></div>

            <div class="order-section">
                <div class="order-item"></div>
                <div class="order-item"></div>
                <div class="order-item"></div>
                <div class="order-item"></div>
            </div>
        </div>

        <div class="rightbar"></div>
    </div>
</body>
</html>
