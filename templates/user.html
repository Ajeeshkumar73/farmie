<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Farmily</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .profile-container {
            max-width: 600px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: block;
            margin: 0 auto;
        }
        .profile-btn {
            width: 100%;
            background: #77b122;
            border: none;
            padding: 10px;
            font-size: 18px;
            color: #fff;
            border-radius: 5px;
            transition: 0.3s;
        }
        .profile-btn:hover {
            background-color: #62911c;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="container profile-container">
    <h2 class="text-center mb-4">User Profile</h2>
    <img src="{{ user.profile_image or url_for('static', filename='images/default-profile.png') }}" class="profile-img" alt="Profile Picture">
    <h4 class="text-center">{{ user.username }}</h4>
    <p class="text-center text-muted">{{ user.email }}</p>

    <form action="/update_profile" method="POST">
        <div class="mb-3">
            <label for="address" class="form-label">Shipping Address</label>
            <textarea name="address" id="address" class="form-control" rows="3" required>{{ user.address }}</textarea>
        </div>
        <button type="submit" class="profile-btn">Update Address</button>
    </form>

    <h3 class="mt-4">Order History</h3>
    <ul class="list-group">
        {% for order in orders %}
        <li class="list-group-item">
            <strong>Order ID:</strong> {{ order._id }} <br>
            <strong>Total:</strong> Rs {{ order.total }} <br>
            <strong>Status:</strong> {{ order.status }}
        </li>
        {% endfor %}
    </ul>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
