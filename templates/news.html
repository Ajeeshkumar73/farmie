<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farming News</title>
</head>
<body>
    <h2>Latest Farming News</h2>
    <ul>
        {% for item in news %}
            <li>
                <a href="{{ item.link }}" target="_blank">{{ item.title }}</a>
                <p>{{ item.summary }}</p>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
