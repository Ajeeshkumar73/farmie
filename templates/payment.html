    <div class=" payment-contain" style="background-color: #ececec; width: 100%; height: 100vh;">

      <div class="row g-3">
        <div class="col-md-6">  
            <span>Payment Method</span>
            <form action="{{ url_for('process_payment') }}" method="POST" onsubmit="return showOrderSuccess()">
        <div class="card">

          <div class="accordion" id="accordionExample">
            
            <div class="card">
              <div class="card-header p-0" id="headingTwo">

                  <button class="btn btn-light btn-block text-left collapsed p-3 rounded-0 border-bottom-custom" type="button" data-toggle="collapse" data-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
                    <div class="d-flex align-items-center justify-content-between">

                  </button>

              </div>

                </div>
              </div>
            </div>
            <div id="cod">
                <div class="radio-group">
                    <label><input type="radio" name="payment_method" id="payment_method" value="cash_on_delivery" required>Cash on Delivery</label>
                </div>
            </div>
            
            <div class="card">
              <div class="card-header p-0">
                <h2 class="mb-0">
                  <button class="btn btn-light btn-block text-left p-3 rounded-0" data-toggle="collapse" data-target="#collapseOne" aria-expanded="true" aria-controls="collapseOne">
                    <div class="d-flex align-items-center justify-content-between">

                      <div class="icons">
                        <img src="{{ url_for('static', filename='images/2ISgYja.png') }}" width="30">
                        <img src="{{ url_for('static', filename='images/W1vtnOV.png') }}" width="30">
                        <img src="{{ url_for('static', filename='images/35tC99g.png') }}" width="30">
                        <img src="{{ url_for('static', filename='images/2ISgYja.png') }}" width="30">
                      </div>
                      
                    </div>
                  </button>

              </div>

              <div id="collapseOne" class="collapse show" aria-labelledby="headingOne" data-parent="#accordionExample">

                      </div> 
                      
                    </div>

            <div class="p-3">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showOrderSuccess() {
            alert("Payment Successful! Your order has been placed.");
            return true; // Allows the form to be submitted after the alert
        }
    </script>  

    <!--form validation-->  
  <script>
    function validateForm() {
        let address = document.getElementById("address");
        let phone = document.getElementById("phoneno");
        let paymentMethods = document.getElementsByName("payment_method");
        let proceedButton = document.querySelector(".payment-btn");
        let isValid = true;

        // Validate Address (Should Not Be Empty)
        if (address.value.trim() === "") {
            address.style.border = "1px solid red";
            isValid = false;
        } else {
            address.style.border = "";
        }

        // Validate Phone Number (Should Be Exactly 10 Digits)
        let phonePattern = /^[0-9]{10}$/;
        if (!phonePattern.test(phone.value.trim())) {
            phone.style.border = "1px solid red";
          
            isValid = false;
          
        } else {
            phone.style.border = "";
        }

        // Validate Payment Method (At Least One Should Be Selected)
        let paymentSelected = false;
        for (let method of paymentMethods) {
            if (method.checked) {
                paymentSelected = true;
                break;
            }
        }

        

        // Disable/Enable Proceed Button
        proceedButton.disabled = !isValid;
        return isValid;
    }

    // Attach validation function to form fields
    document.getElementById("address").addEventListener("input", validateForm);
    document.getElementById("phoneno").addEventListener("input", validateForm);
    document.querySelectorAll('input[name="payment_method"]').forEach(input => {
        input.addEventListener("change", validateForm);
    });

</script>
<script>
  function validatePaymentMethod() {
      let paymentMethods = document.getElementsByName("payment_method");
      let paymentSelected = false;
      for (let method of paymentMethods) {
          if (method.checked) {
              paymentSelected = true;
              break;
          }
      }
      if (!paymentSelected) {
          alert("Please select a payment method before proceeding.");
          return false;
      }
      return true;
  }
</script>
